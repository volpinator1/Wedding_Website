<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
            padding: 50px;
            background-image: url('floral-background.jpg');
            background-size: cover;
        }
        .rsvp-button {
            padding: 10px 20px;
            background-color: #ff69b4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        .rsvp-button:hover {
            background-color: #ff1493;
        }
    </style>
</head>
<body>
    <h1>You're Invited to Millie and Ezra's Wedding!</h1>
    <h2>Date: April 7, 2027</h2>
    <p>Join us for a beautiful celebration filled with love and joy.</p>
    <button class="rsvp-button">RSVP</button>
</body>
</html>
